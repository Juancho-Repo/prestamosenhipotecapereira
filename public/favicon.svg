<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0d1f3c"/>
  <!-- House body -->
  <rect x="16" y="30" width="32" height="22" rx="2" fill="#c9a84c"/>
  <!-- Roof -->
  <polygon points="10,32 32,10 54,32" fill="#e4c97e"/>
  <!-- Door -->
  <rect x="26" y="38" width="12" height="14" rx="2" fill="#0d1f3c"/>
  <!-- Dollar sign on door -->
  <text x="32" y="49" text-anchor="middle" font-family="serif" font-size="10" font-weight="bold" fill="#c9a84c">$</text>
</svg>
